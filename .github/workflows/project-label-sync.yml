name: Sync Project Board → Labels

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Sync project status to labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const org = 'XF-APAC';
            const repo = context.repo.repo;
            const repoOwner = context.repo.owner;
            const projectNumber = 3;

            const query = `query($org: String!, $number: Int!) {
              organization(login: $org) {
                projectV2(number: $number) {
                  items(first: 100) {
                    nodes {
                      fieldValueByName(name: "Status") {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                        }
                      }
                      content {
                        ... on Issue {
                          number
                          labels(first: 10) {
                            nodes { name }
                          }
                          repository {
                            name
                            owner { login }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query, { 
              org: org, 
              number: projectNumber 
            });

            const items = result.organization.projectV2.items.nodes;

            for (const item of items) {
              const content = item.content;
              if (!content || !content.number) continue;
              if (content.repository?.name !== repo) continue;
              if (content.repository?.owner?.login !== repoOwner) continue;

              const status = item.fieldValueByName?.name;
              const labels = content.labels.nodes.map(l => l.name);
              const hasReadyLabel = labels.includes('symphony:ready');
              const issueNumber = content.number;

              if (status === 'Ready' && !hasReadyLabel) {
                await github.rest.issues.addLabels({
                  owner: repoOwner,
                  repo,
                  issue_number: issueNumber,
                  labels: ['symphony:ready']
                });
                console.log(`Added symphony:ready to #${issueNumber}`);
              } else if (status !== 'Ready' && hasReadyLabel) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: repoOwner,
                    repo,
                    issue_number: issueNumber,
                    name: 'symphony:ready'
                  });
                  console.log(`Removed symphony:ready from #${issueNumber}`);
                } catch (e) {}
              }
            }
