name: Visual Preview

on:
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-branch

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base-branch

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Create screenshot script
        run: |
          cat > screenshot.js << 'SCRIPT'
          const puppeteer = require('puppeteer');

          const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

          async function takeScreenshots(url, prefix) {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 800 });
            await page.goto(url, { waitUntil: 'networkidle0' });

            // Screenshot: empty state
            await page.screenshot({ path: `${prefix}-empty.png`, fullPage: true });

            // Add some sample todos
            const todos = ['Buy groceries', 'Review PR #42', 'Ship the feature'];
            for (const todo of todos) {
              await page.type('#input', todo);
              await page.click('button[onclick="addTodo()"]');
              await delay(500);
            }

            // Screenshot: with todos
            await page.screenshot({ path: `${prefix}-with-todos.png`, fullPage: true });

            // Complete one
            const checks = await page.$$('.check');
            if (checks.length > 0) await checks[0].click();
            await delay(500);

            // Screenshot: with completed
            await page.screenshot({ path: `${prefix}-completed.png`, fullPage: true });

            await browser.close();
          }

          async function main() {
            const [,, url, prefix] = process.argv;
            await takeScreenshots(url, prefix);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT

      - name: Screenshot base branch (before)
        run: |
          cd base-branch && node src/server.js &
          sleep 2
          node screenshot.js http://localhost:3000 before
          kill %1 2>/dev/null || true
          sleep 1

      - name: Screenshot PR branch (after)
        run: |
          cd pr-branch && PORT=3001 node src/server.js &
          sleep 2
          node screenshot.js http://localhost:3001 after
          kill %1 2>/dev/null || true

      - name: Upload screenshots to branch
        run: |
          mkdir screenshots-upload
          cp before-*.png after-*.png screenshots-upload/
          cd screenshots-upload
          git init
          git checkout --orphan screenshots
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Screenshots for PR #${{ github.event.pull_request.number }} run ${{ github.run_id }}"
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git push origin screenshots:refs/heads/screenshots/pr-${{ github.event.pull_request.number }} --force

      - name: Post comparison to PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const branch = `screenshots/pr-${prNumber}`;
            const base = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}`;

            const body = `## 📸 Visual Preview

            | State | Before (master) | After (this PR) |
            |-------|-----------------|-----------------|
            | Empty | ![before-empty](${base}/before-empty.png) | ![after-empty](${base}/after-empty.png) |
            | With todos | ![before-with-todos](${base}/before-with-todos.png) | ![after-with-todos](${base}/after-with-todos.png) |
            | Completed | ![before-completed](${base}/before-completed.png) | ![after-completed](${base}/after-completed.png) |
            `;

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: prNumber,
              body: body.replace(/            /g, '')
            });
